<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background: linear-gradient(to right,yellow,greenyellow);
        animation-name: this;
        animation-duration: 3s;
        transition: ease-in-out;
    }
    .m1{
        box-shadow: 2px 3px 4px 8px red;
        animation-name: demo;
        transition: ease-in-out;
        animation-duration: 3s;
        background-color: teal;
    }
    
    @keyframes demo {
        0%{
            box-shadow: 2px 4px 5px 8px  greenyellow;
            margin-right: 200px;
            
        }
        25%{
            box-shadow: 0px 0px 0px 2px white;
            margin-left: 300px;
        }
        50%{
            box-shadow: 2px 3px 4px 9px yellow;
            margin-right: 400px;
        }
        75%{
            box-shadow: 2px 3px 4px 6px tomato;
            margin-right: 500px;
        }
        100%{
            box-shadow: 2px 3px 4px 5px brown;
            margin-right: 1000px;
        }
    }
    @keyframes this { 
        10%{
            background:radial-gradient(to right,yellow,greenyellow) ;
        }
        20%{
            background: linear-gradient(to right,#f7e1d7,#48cae4);
        }
        30%{
            background: linear-gradient(to right,#ffc300,#f5ebe0);
        }
        40%{
            background: linear-gradient(to right,#a8dadc,#d9ed92);
        }
        50%{
           background: linear-gradient(to right,#fcca46,#ffcad4);
        }
        60%{
            background: linear-gradient(to right,#e5e5e5,#43291f);
        }
        70%{
            background: linear-gradient(to right,#57cc99,#c77dff);
        }
        80%{
            background: linear-gradient(to right,#ffaa00,#9b5de5);
        }
        90%{
            background: linear-gradient(to right,#218380,#ffd500);
        }
        100%{
            background: linear-gradient(to right,#ffb4a2,#d8e2dc);
        }
    }
    .h{
        font-size: xx-large;
        word-spacing: 10px;
    }
</style>
<body>
    <p class="m1">this is me</p>
    <h1 class="h">WHAAAA</h1>
</body>
</html>
