<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  #c1{
    background-color: greenyellow;
    color: white;
    border-radius: 5px;
    height: 100px;
    width: 100px;
    position: relative;
    left: 500px;
    
  }
</style>
<body>
  <button onclick="getmessage()" onscroll="scrollnow()" id="c1"></button>
  <script>
    function getmessage(){
      document.getElementById("c1").style.borderRadius="20px";
    }
    function scrollnow(){
      document.getElementById("c1").style.animation="2s";
    }
  </script>
</body>
</html>
